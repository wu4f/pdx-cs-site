<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{ title }} | Portland State University, Department of Computer Science</title>
    <base href="{{ base_href|default('/') }}">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <meta name="description" content="{{ meta_description }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PSU Computer Science">
    <meta property="og:title" content="{{ title }} | Portland State University, Department of Computer Science">
    <meta property="og:description" content="{{ meta_description }}">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <link rel="icon" href="https://web.cs.pdx.edu/favicon.ico" type="image/vnd.microsoft.icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {{ style }}
    <style>
      :root {
        --psu-green: #547119;
        --psu-green-dark: #3f5512;
        --psu-green-light: #eaf2d4;
        --psu-gold: #d4a017;
        --ink: #1e2230;
        --ink-soft: #4a5060;
        --ink-muted: #6b7280;
        --bg: #f7f8fb;
        --border: #e6e8ee;
        --shadow-sm: 0 1px 2px rgba(20,25,40,.04), 0 1px 3px rgba(20,25,40,.06);
        --content-max: 900px;
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 16px;
        line-height: 1.65;
        color: var(--ink);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }

      /* ---- Skip link ---- */
      .skip-link {
        position: absolute; left: -10000px; top: 8px;
        background: var(--ink); color: #fff !important;
        padding: 10px 16px; border-radius: 6px;
        font-weight: 600; z-index: 1000; text-decoration: none;
      }
      .skip-link:focus { left: 16px; outline: 3px solid #ffd54f; }
      :focus-visible { outline: 3px solid #2a6cff; outline-offset: 2px; border-radius: 4px; }

      {% include 'partials/header_styles.html' %}

      /* ---- Page wrapper ---- */
      .page-layout {
        max-width: 1240px;
        margin: 0 auto;
        padding: 2rem 28px 4rem;
        display: grid;
        grid-template-columns: 1fr;
      }

      /* ---- Content card ---- */
      .content-card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2.5rem 3rem;
        box-shadow: var(--shadow-sm);
        max-width: var(--content-max);
      }

      /* ---- Typography for Google Docs content ---- */
      .content-card h1 {
        font-size: 1.85rem;
        font-weight: 700;
        color: var(--psu-green-dark);
        margin: 0 0 1.5rem;
        line-height: 1.25;
        padding-bottom: 0.75rem;
        border-bottom: 2px solid var(--psu-green-light);
      }
      .content-card h2 {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--psu-green-dark);
        margin: 2.25rem 0 0.75rem;
        line-height: 1.3;
      }
      .content-card h2:first-child { margin-top: 0; }
      .content-card h1,
      .content-card h2,
      .content-card h3,
      .content-card h4 { scroll-margin-top: 160px; }
      .content-card h3 {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--ink);
        margin: 1.75rem 0 0.5rem;
      }
      .content-card h4 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--ink);
        margin: 1.25rem 0 0.4rem;
      }
      .content-card p {
        margin: 0 0 1rem;
        color: var(--ink);
      }
      .content-card ul,
      .content-card ol {
        margin: 0 0 1rem 1.4rem;
        padding: 0;
      }
      .content-card li { margin-bottom: 0.4rem; }
      .content-card hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }

      /* ---- Links ---- */
      .content-card a,
      .content-card a:link,
      .content-card a:visited {
        color: #0b3d91;
        text-decoration: underline;
      }
      .content-card a:hover { color: #062a66; }

      /* ---- Tables ---- */
      .content-card table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0 1.5rem;
        font-size: 0.93rem;
        overflow-x: auto;
        display: block;
      }
      .content-card thead th {
        background: var(--psu-green-dark);
        color: #fff;
        font-weight: 600;
        padding: 9px 14px;
        text-align: left;
        border: 1px solid var(--psu-green-dark);
        white-space: nowrap;
      }
      .content-card td {
        padding: 8px 14px;
        border: 1px solid var(--border);
        vertical-align: top;
      }
      .content-card tr:nth-child(even) td { background: var(--bg); }

      /* ---- Footer ---- */
      .site-footer {
        background: var(--psu-green-dark);
        color: rgba(255,255,255,.85);
        padding: 2.5rem 28px;
        margin-top: 2rem;
        font-size: 14px;
      }
      .site-footer__inner {
        max-width: 1240px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 2rem;
        justify-content: space-between;
        align-items: flex-start;
      }
      .site-footer__col { min-width: 180px; }
      .site-footer strong { color: #fff; font-size: 15px; display: block; margin-bottom: 0.5rem; }
      .site-footer p { margin: 0.2rem 0; }
      .site-footer a { color: rgba(255,255,255,.8); text-decoration: none; }
      .site-footer a:hover { color: #fff; text-decoration: underline; }

      /* ---- Responsive ---- */
      @media (max-width: 700px) {
        .site-header__inner { padding: 12px 16px; }
        .site-header__logo img { height: 56px; }
        .site-header__cta .label { display: none; }
        .site-header__cta { padding: 10px 12px; }
        .nav-bar__inner { padding-left: 16px; padding-right: 16px; }
        .page-layout { padding: 1rem 16px 3rem; }
        .content-card { padding: 1.5rem 1.25rem; }
        .content-card h1 { font-size: 1.45rem; }
        .content-card h2 { font-size: 1.15rem; }
        .site-footer { padding: 2rem 16px; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }

      /* ---- Table of Contents ---- */
      .toc {
        display: inline-block;
        background: var(--psu-green-light);
        border: 1px solid #c8dea0;
        border-radius: 8px;
        padding: 0.9rem 1.1rem;
        margin: 1.25rem 0 1.75rem;
        min-width: 200px;
        max-width: 440px;
        font-size: 0.875rem;
        line-height: 1.5;
      }
      .toc__heading {
        font-weight: 700;
        font-size: 0.9rem;
        color: var(--psu-green-dark);
        margin: 0 0 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .toc__list {
        margin: 0;
        padding: 0;
        list-style: none;
        counter-reset: toc-h2 0 toc-h3 0 toc-h4 0;
      }
      .toc__list li { margin-bottom: 0.15rem; }
      .toc__list a { color: var(--psu-green-dark); text-decoration: none; }
      .toc__list a:hover { text-decoration: underline; }
      .toc-h2 { counter-increment: toc-h2; counter-reset: toc-h3 0 toc-h4 0; }
      .toc-h3 { counter-increment: toc-h3; counter-reset: toc-h4 0; padding-left: 1.1rem; }
      .toc-h4 { counter-increment: toc-h4; padding-left: 2.2rem; }
      .toc-h2::before { content: counter(toc-h2) ". "; font-weight: 600; }
      .toc-h3::before { content: counter(toc-h2) "." counter(toc-h3) ". "; }
      .toc-h4::before { content: counter(toc-h2) "." counter(toc-h3) "." counter(toc-h4) ". "; }
    </style>
  </head>
  <body>
    {% include 'partials/header.html' %}

    <main id="main-content">
      <div class="page-layout">
        <article class="content-card" aria-label="{{ title }}">
          {{ body }}
        </article>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <div class="site-footer__col">
          <strong>Department of Computer Science</strong>
          <p>Portland State University</p>
          <p>1900 SW 4th Avenue, Suite 120</p>
          <p>Portland, OR 97201</p>
        </div>
        <div class="site-footer__col">
          <p>Phone: <a href="tel:+15037254036">503-725-4036</a></p>
          <p>Email: <a href="mailto:csoffice@pdx.edu">csoffice@pdx.edu</a></p>
          <p><a href="https://web.cs.pdx.edu/">web.cs.pdx.edu</a></p>
        </div>
      </div>
    </footer>

    {% include 'partials/nav_js.html' %}
    </script>

  </body>
</html>
