<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{ title }} | Portland State University, Department of Computer Science</title>
    <base href="{{ base_href|default('/') }}">
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <meta name="description" content="Information about {{ title }} for the Department of Computer Science at Portland State University in Portland, Oregon.">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <link rel="icon" href="https://web.cs.pdx.edu/favicon.ico" type="image/vnd.microsoft.icon">
    <meta name="author" content="http://bootstraptaste.com">
    <!-- css (always loaded from production site so preview deploys still look right) -->
    <link href="https://web.cs.pdx.edu/css/pdx-style.css" rel="stylesheet">
    {{ style }}
    <!-- Accessibility overrides: improve link contrast on top of Google's export.
         Section pages inherit Google's CSS which uses #1155cc and lighter grays;
         force a darker tone for inline links so they pass WCAG 2.1 AA (>=4.5:1). -->
    <style>
      .skip-link {
        position: absolute; left: -10000px; top: 8px;
        background: #1e2230; color: #fff !important;
        padding: 10px 16px; border-radius: 6px;
        font-weight: 600; z-index: 1000; text-decoration: none;
      }
      .skip-link:focus { left: 16px; outline: 3px solid #ffd54f; }
      :focus-visible { outline: 3px solid #2a6cff; outline-offset: 2px; }
      main#main-content a, main#main-content a:link, main#main-content a:visited {
        color: #0b3d91 !important;       /* 9.6:1 on white, passes AA & AAA */
      }
      main#main-content a:hover { color: #062a66 !important; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
    <!-- HTML5 shim, for IE6-8 support of HTML5 elements -->
    <!--[if lt IE 9]>
      <script src="http://html5shim.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
  </head>
  <body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<header role="banner" style="background-color:#fff; border-bottom:1px solid #ccc; padding:10px 20px; display:flex; align-items:center; gap:40px; font-family:Arial, sans-serif;">
<p><a href="{{ base_href|default('/') }}" aria-label="PSU CS home"><img alt="Portland State University Department of Computer Science" src="https://web.cs.pdx.edu/images/pdx-cs-logo.png" style="height:80px;"/></a></p>
</header>
<main id="main-content">
  <div id="wrapper">
    <section id="content" aria-label="{{ title }}">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="box">
              <div class="box-gray aligncenter">
                  {{ body }}
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
</body>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollegeOrUniversity",
  "name": "Portland State University, Department of Computer Science",
  "url": "https://web.cs.pdx.edu/",
  "telephone": "+1-503-725-4036",
  "email": "csoffice@pdx.edu",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "1900 SW 4th Avenue, Suite 120",
    "addressLocality": "Portland",
    "addressRegion": "OR"
  }
}
</script>
</html>
