<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a class="site-header__logo" href="{{ base_href }}" aria-label="PSU CS home">
      <img alt="Portland State University Department of Computer Science" src="{{ base_href }}images/pdx-cs-logo.png">
    </a>
    <div class="site-header__spacer"></div>
    <a class="site-header__cta" href="{{ base_href }}ask/" aria-label="Ask the CS Assistant">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
      <span class="label">Ask the Assistant</span>
    </a>
  </div>
  {% if nav_groups %}
  <nav class="nav-bar" aria-label="Category navigation">
    <div class="nav-bar__inner">
      {% for cat, items in nav_groups %}
      <div class="nav-item">
        <a class="nav-label" href="{{ base_href }}#{{ cat }}" aria-haspopup="true" aria-expanded="false">{{ cat_labels.get(cat, cat.replace('-', ' ').title()) }}<span class="nav-caret" aria-hidden="true">▾</span></a>
        <ul class="nav-dropdown" role="list" hidden>
          {% for s in items %}
          <li><a href="{{ s.url_path }}">{{ s.title }}</a></li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </div>
  </nav>
  {% endif %}
</header>
